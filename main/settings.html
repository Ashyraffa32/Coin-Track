<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pengaturan</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link" data-i18n="backLink">← Back</a>
        <h1 data-i18n="settingsTitle">Settings</h1>

        <div class="settings-container">
            <div class="setting-item">
                <label for="theme-selector" data-i18n="themeLabel">Theme (Beta)</label>
                <select id="theme-selector">
                    <option value="light" data-i18n="lightModeOption">Light</option>
                    <option value="dark" data-i18n="darkModeOption">Dark</option>
                </select>
            </div>

            <div class="setting-item">
                <label data-i18n="languageLabel">Language</label>
                <div class="button-group">
                    <button id="lang-id-btn" data-lang="id">Bahasa Indonesia</button>
                    <button id="lang-en-btn" data-lang="en">English</button>
                </div>
            </div>

            <div class="setting-item">
                <label for="currency-input" data-i18n="currencyLabel">Currency</label>
                <input type="text" id="currency-input" placeholder="e.g., $" data-i18n-placeholder="currencyPlaceholder">
                <button id="save-currency-btn" data-i18n="saveButton">Save</button>
            </div>

            <div class="setting-item">
                <button id="reset-btn" class="btn-danger" data-i18n="resetButton">Reset Data</button>
            </div>

            <div class="about">
                <p>CoinTrack v1.3.0, made by Ashyraffa</p>
            </div>
        </div>
    </div>
    
    <script src="lang.js"></script>
    <script src="app-settings.js"></script>
    <script src="settings.js"></script>
</body>
</html>
